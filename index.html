<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Marathon">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>NYC Marathon Training</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --base:#5DCAA5; --build:#85B7EB; --peak:#F0997B; --taper:#EF9F27;
      --base-bg:#E8F8F2; --build-bg:#E6F1FB; --peak-bg:#FDF0EB; --taper-bg:#FEF4E4;
      --bg:#f5f5f3; --card:#ffffff; --text:#1a1a18; --muted:#888; --border:#e0e0da;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg); color:var(--text);
    }
    .app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

    /* Header */
    .header {
      background:var(--text); color:#fff; flex-shrink:0;
      padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px)*0);
      padding-top:calc(14px + env(safe-area-inset-top,0px));
      display:flex; justify-content:space-between; align-items:flex-end;
    }
    .header-title { font-size:17px; font-weight:600; letter-spacing:-0.3px; }
    .header-sub   { font-size:12px; opacity:0.55; margin-top:2px; }
    .header-right { text-align:right; }
    .header-date  { font-size:12px; opacity:0.55; }
    .header-wk    { font-size:13px; font-weight:500; margin-top:2px; }

    /* Scroll area */
    .main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .tab  { display:none; padding:16px 16px 40px; }
    .tab.active { display:block; }

    /* Bottom nav */
    .nav {
      display:flex; background:var(--card); border-top:1px solid var(--border);
      padding-bottom:env(safe-area-inset-bottom,0px); flex-shrink:0;
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:10px 0; border:none; background:none;
      cursor:pointer; color:var(--muted); font-size:10px; font-family:inherit;
      gap:3px; min-height:56px; transition:color 0.15s;
    }
    .nav-btn.active { color:var(--text); font-weight:600; }
    .nav-icon { font-size:22px; line-height:1; }

    /* Card */
    .card {
      background:var(--card); border-radius:14px; border:1px solid var(--border);
      padding:16px; margin-bottom:12px;
    }
    .section-label {
      font-size:11px; font-weight:600; letter-spacing:0.7px; text-transform:uppercase;
      color:var(--muted); margin-bottom:10px;
    }

    /* Run rows */
    .run-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 0; border-bottom:1px solid var(--border);
    }
    .run-item:last-child { border-bottom:none; }
    .run-item.hi { margin:0 -16px; padding:10px 16px; border-radius:8px; }
    .run-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .run-info { flex:1; min-width:0; }
    .run-mi   { font-size:13px; font-weight:600; }
    .run-day  { font-weight:400; color:var(--muted); font-size:11px; margin-left:4px; }
    .run-desc { font-size:12px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .run-check {
      width:30px; height:30px; border-radius:50%; border:2px solid var(--border);
      background:none; cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:13px; flex-shrink:0;
      transition:all 0.15s; color:transparent;
    }
    .run-check.done { color:#fff; }

    /* Today tab */
    .today-hero { border-radius:16px; padding:20px; margin-bottom:12px; }
    .today-type  { font-size:12px; font-weight:600; opacity:0.7; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; }
    .today-miles { font-size:42px; font-weight:800; line-height:1; margin-bottom:6px; }
    .today-miles span { font-size:18px; font-weight:500; opacity:0.7; }
    .today-desc  { font-size:14px; opacity:0.85; line-height:1.5; margin-bottom:16px; }
    .check-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:14px; border-radius:12px; border:none;
      font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
      transition:opacity 0.15s;
    }
    .check-btn:active { opacity:0.75; }

    .center-card { text-align:center; padding:36px 20px; }
    .big-emoji   { font-size:52px; margin-bottom:14px; }
    .center-title{ font-size:22px; font-weight:700; margin-bottom:6px; }
    .center-sub  { font-size:14px; color:var(--muted); line-height:1.5; }
    .cdnum { font-size:72px; font-weight:800; line-height:1; }
    .cdunit{ font-size:16px; color:var(--muted); margin-top:4px; }

    .race-hero {
      border-radius:16px; padding:36px 20px; text-align:center;
      background:linear-gradient(135deg,#EF9F27,#F0997B); color:#fff; margin-bottom:12px;
    }

    /* Plan tab */
    .wk-card {
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:14px 16px; margin-bottom:8px; cursor:pointer;
      transition:background 0.1s; user-select:none;
    }
    .wk-card:active { background:#f0f0ed; }
    .wk-card.exp { border-radius:12px 12px 0 0; margin-bottom:0; border-bottom-color:transparent; }
    .wk-head  { display:flex; justify-content:space-between; align-items:flex-start; }
    .wk-num   { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin-bottom:3px; }
    .wk-row   { display:flex; align-items:center; gap:7px; }
    .wk-date  { font-size:16px; font-weight:600; }
    .phase-chip {
      font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px;
      text-transform:uppercase; letter-spacing:0.4px;
    }
    .wk-right { text-align:right; }
    .wk-mi    { font-size:17px; font-weight:700; }
    .wk-runs  { font-size:12px; color:var(--muted); margin-top:2px; }
    .wk-pbar  { height:3px; background:var(--border); border-radius:2px; margin-top:10px; overflow:hidden; }
    .wk-pfill { height:100%; border-radius:2px; transition:width 0.4s; }

    .wk-detail {
      background:var(--card); border:1px solid var(--border); border-top:none;
      border-radius:0 0 12px 12px; padding:0 16px 14px; margin-bottom:8px; display:none;
    }
    .wk-detail.open { display:block; }
    .wk-tip {
      font-size:13px; color:#666; padding:10px 12px; background:var(--bg);
      border-radius:8px; margin-bottom:10px; line-height:1.55;
    }

    /* Stats tab */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .stat-card  { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:14px; }
    .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:500; }
    .stat-val   { font-size:24px; font-weight:700; }
    .stat-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
    .ring-wrap  { display:flex; justify-content:center; padding:24px 0; }

    .pb-row  { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .pb-name { width:44px; font-size:12px; color:var(--muted); }
    .pb-track{ flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .pb-fill { height:100%; border-radius:4px; transition:width 0.4s; }
    .pb-ct   { font-size:12px; color:var(--muted); width:36px; text-align:right; }

    .pace-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .pace-row:last-child { border-bottom:none; }
    .pdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* Install banner */
    .install-bar {
      display:none; background:var(--text); color:#fff; border-radius:12px;
      padding:12px 16px; margin-bottom:12px; align-items:center; gap:12px;
    }
    .install-bar.show { display:flex; }
    .install-btn {
      margin-left:auto; background:#5DCAA5; color:#fff; border:none;
      border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600;
      cursor:pointer; font-family:inherit; white-space:nowrap;
    }

    /* Run log */
    .log-btn {
      width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border);
      background:none; cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:12px; flex-shrink:0; color:var(--muted);
      transition:all 0.15s; margin-right:-4px;
    }
    .log-btn.logged { border-color:#5DCAA5; color:#5DCAA5; }
    .log-badge { font-size:11px; color:#5DCAA5; font-weight:500; margin-top:2px; }
    .log-link {
      display:block; width:100%; padding:9px 0 2px; background:none; border:none;
      font-size:13px; color:var(--muted); cursor:pointer; text-align:center;
      font-family:inherit; letter-spacing:0.1px;
    }
    .actual-badge {
      font-size:12px; color:#5DCAA5; font-weight:500; margin-top:6px;
      padding:6px 10px; background:rgba(93,202,165,0.12); border-radius:8px; display:inline-block;
    }

    /* Bottom sheet */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100;
      display:none; backdrop-filter:blur(2px);
    }
    .overlay.open { display:block; }
    .sheet {
      position:fixed; bottom:0; left:0; right:0; background:var(--card);
      border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));
      z-index:101; transform:translateY(100%); transition:transform 0.3s cubic-bezier(.32,.72,0,1);
      max-width:520px; margin:0 auto;
    }
    .sheet.open { transform:translateY(0); }
    .sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
    .sheet-title { font-size:16px; font-weight:600; margin-bottom:18px; }
    .field-row   { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .field-group { margin-bottom:14px; }
    .field-label { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    .field-input {
      width:100%; padding:12px 13px; border:1.5px solid var(--border); border-radius:10px;
      font-size:16px; font-family:inherit; background:var(--bg); color:var(--text); outline:none;
      transition:border-color 0.15s; -webkit-appearance:none;
    }
    .field-input:focus { border-color:#5DCAA5; }
    .sheet-btns { display:flex; gap:10px; margin-top:4px; }
    .btn-save {
      flex:1; padding:14px; background:#5DCAA5; color:#fff; border:none; border-radius:12px;
      font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
    }
    .btn-cancel {
      padding:14px 18px; background:var(--bg); color:var(--muted); border:1.5px solid var(--border);
      border-radius:12px; font-size:15px; cursor:pointer; font-family:inherit;
    }
    .btn-clear {
      padding:14px; background:none; color:#F0997B; border:1.5px solid #F0997B40;
      border-radius:12px; font-size:13px; cursor:pointer; font-family:inherit;
    }
    .btn-strava {
      width:100%; padding:11px; background:#FC4C02; color:#fff; border:none;
      border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
      font-family:inherit; display:flex; align-items:center; justify-content:center; gap:7px;
      margin-bottom:14px;
    }
    .strava-chip {
      display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
      color:#FC4C02; background:#FFF0EB; border:1px solid #FC4C0240; border-radius:20px;
      padding:4px 10px;
    }

    /* Auth screen */
    .auth-screen {
      position:fixed; inset:0; background:var(--bg); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .auth-screen.hidden { display:none; }
    .auth-box { width:100%; max-width:360px; }
    .auth-logo {
      width:56px; height:56px; background:var(--text); border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:28px; font-weight:800; color:#5DCAA5; margin:0 auto 12px;
    }
    .auth-tabs {
      display:flex; background:var(--border); border-radius:10px;
      padding:3px; margin-bottom:20px;
    }
    .auth-tab {
      flex:1; padding:8px; border:none; border-radius:8px; font-size:14px;
      font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.15s;
    }
    .auth-tab.active { background:var(--card); color:var(--text); }
    .auth-tab:not(.active) { background:transparent; color:var(--muted); }
    .auth-error { font-size:13px; color:#F0997B; margin-bottom:12px; display:none; }

    /* User pill in header */
    .user-pill {
      display:flex; align-items:center; gap:6px; cursor:pointer;
      background:rgba(255,255,255,0.12); border-radius:20px; padding:4px 10px 4px 4px;
      border:none; color:#fff; font-family:inherit; font-size:12px;
    }
    .user-avatar {
      width:22px; height:22px; border-radius:50%; background:#5DCAA5;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:700; color:#1a1a18; flex-shrink:0;
    }

    /* Friends feed */
    .friend-row {
      display:flex; align-items:center; gap:12px;
      padding:10px 0; border-bottom:1px solid var(--border);
    }
    .friend-row:last-child { border-bottom:none; }
    .friend-avatar {
      width:34px; height:34px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:#fff;
    }
  </style>
</head>
<body>

<!-- Auth screen -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:28px;">
      <div class="auth-logo">M</div>
      <div style="font-size:20px;font-weight:700;">NYC Marathon</div>
      <div style="font-size:13px;color:var(--muted);margin-top:3px;">3:40 Training Plan</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-in" onclick="switchAuthMode('in')">Sign in</button>
      <button class="auth-tab" id="auth-tab-up" onclick="switchAuthMode('up')">Sign up</button>
    </div>
    <div id="auth-name-wrap" style="display:none;margin-bottom:14px;">
      <div class="field-label">Your name</div>
      <input class="field-input" id="auth-name" type="text" placeholder="Emma">
    </div>
    <div style="margin-bottom:14px;">
      <div class="field-label">Email</div>
      <input class="field-input" id="auth-email" type="email" placeholder="you@example.com" inputmode="email">
    </div>
    <div style="margin-bottom:20px;">
      <div class="field-label">Password</div>
      <input class="field-input" id="auth-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-save" id="auth-submit" onclick="handleAuth()" style="width:100%">Sign in</button>
    <div id="auth-confirm" style="display:none;text-align:center;font-size:13px;color:var(--muted);margin-top:16px;line-height:1.5;">
      ✅ Check your email to confirm your account, then sign in.
    </div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <header class="header">
    <div>
      <div class="header-title">NYC Marathon Training</div>
      <div class="header-sub" id="header-sub"></div>
    </div>
    <div class="header-right" id="hdr-right"></div>
    <button class="user-pill" id="user-pill" onclick="doSignOut()" style="display:none">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name-label"></span>
    </button>
  </header>

  <main class="main">
    <div class="tab active" id="tab-today"></div>
    <div class="tab"        id="tab-plan"></div>
    <div class="tab"        id="tab-stats"></div>
    <div class="tab"        id="tab-strava"></div>
  </main>

  <nav class="nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <span class="nav-icon">🏃</span><span>Today</span>
    </button>
    <button class="nav-btn" id="nav-plan" onclick="switchTab('plan')">
      <span class="nav-icon">📅</span><span>Plan</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')">
      <span class="nav-icon">📊</span><span>Stats</span>
    </button>
    <button class="nav-btn" id="nav-strava" onclick="switchTab('strava')">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg></span>
      <span>Strava</span>
    </button>
  </nav>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────
var PC  = ['#5DCAA5','#85B7EB','#F0997B','#EF9F27'];
var PL  = ['#E8F8F2','#E6F1FB','#FDF0EB','#FEF4E4'];
var PN  = ['Base','Build','Peak','Taper'];
var PT  = [
  'All easy aerobic miles. Every run fully conversational — you\'re laying the foundation.',
  'Tempo and marathon pace work begin. Keep quality sessions controlled and purposeful.',
  'Highest mileage weeks, capped at 46 miles. Long runs with marathon-pace miles build race confidence.',
  'Trust the training — resist adding miles. Fresh legs beat extra workouts every time.'
];
var TC  = ['#9FE1CB','#85B7EB','#F0997B','#5DCAA5'];
var TL  = ['Easy','Tempo','Marathon Pace','Long Run'];
var RUN_DAYS   = [1,2,3,4,6];
var DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function getPlanStart() {
  var rd=getRaceDate();
  var d=new Date(rd.getTime()-26*7*86400000);
  var dow=d.getDay();
  d.setDate(d.getDate()+(dow===0?-6:1-dow)); // snap to Monday
  return d;
}
function getRaceDate()  { return new Date((settings.raceDate||'2026-11-01')+'T00:00:00'); }
function wkDateStr(wi)  { var d=getPlanStart(); d.setDate(d.getDate()+wi*7); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function dynDesc(desc,typeIdx) {
  if (typeIdx!==1&&typeIdx!==2) return desc;
  var mp=goalPaceSecs();
  var repl=typeIdx===1?fmtPace(mp-25)+'–'+fmtPace(mp-15)+'/mi':fmtPace(mp-4)+'–'+fmtPace(mp+2)+'/mi';
  return desc.replace(/\d+:\d{2}[–\-]\d+:\d{2}\/mi/g,repl);
}
var PLAN_START = getPlanStart();
var RACE_DATE  = getRaceDate();

// ── Training data ─────────────────────────────────────────────
// [num, dateStr, phaseIdx, weekMiles, [[miles, typeIdx, desc], ...]]
var wks = [
[1,'Apr 27',0,25,[[4,0,'4 miles easy'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[9,3,'9 miles long run']]],
[2,'May 4',0,28,[[4,0,'4 miles easy'],[5,0,'5 miles easy'],[4,0,'4 miles easy'],[5,0,'5 miles easy'],[10,3,'10 miles long run']]],
[3,'May 11',0,31,[[5,0,'5 miles easy'],[5,0,'5 miles easy'],[4,0,'4 miles easy'],[5,0,'5 miles easy'],[12,3,'12 miles long run']]],
[4,'May 18',0,23,[[3,0,'3 miles easy'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[8,3,'8 miles long run — recovery week']]],
[5,'May 25',0,33,[[5,0,'5 miles easy'],[6,0,'6 miles easy'],[5,0,'5 miles easy'],[5,0,'5 miles easy'],[12,3,'12 miles long run']]],
[6,'Jun 1',0,35,[[5,0,'5 miles easy'],[6,0,'6 miles easy'],[5,0,'5 miles easy'],[6,0,'6 miles easy'],[13,3,'13 miles long run']]],
[7,'Jun 8',0,37,[[5,0,'5 miles easy'],[6,0,'6 miles easy'],[6,0,'6 miles easy'],[6,0,'6 miles easy'],[14,3,'14 miles long run']]],
[8,'Jun 15',1,28,[[4,0,'4 miles easy'],[5,0,'5 miles easy'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[11,3,'11 miles long run — recovery week']]],
[9,'Jun 22',1,38,[[6,0,'6 miles easy'],[8,1,'8 miles: 2 warm-up + 4 tempo (7:55–8:10/mi) + 2 cool-down'],[5,0,'5 miles easy'],[5,0,'5 miles easy'],[14,3,'14 miles long run']]],
[10,'Jun 29',1,39,[[6,0,'6 miles easy'],[8,1,'8 miles: 2 warm-up + 4 tempo + 2 cool-down'],[5,0,'5 miles easy'],[5,0,'5 miles easy'],[15,3,'15 miles long run']]],
[11,'Jul 6',1,31,[[5,0,'5 miles easy'],[7,1,'7 miles: 2 warm-up + 3 tempo + 2 cool-down'],[4,0,'4 miles easy'],[4,0,'4 miles easy'],[11,3,'11 miles long run — recovery week']]],

// ── State ─────────────────────────────────────────────────────
var state = { completed:{}, expandedWeek:-1, logs:{}, adjusted:{} };
var settings = { goalTime: '3:40:00', raceDate: '2026-11-01' };
function loadSettings() {
  try { var s = localStorage.getItem('marathon-settings'); if (s) settings = Object.assign(settings, JSON.parse(s)); } catch(e) {}
}
function saveSettings() { try { localStorage.setItem('marathon-settings', JSON.stringify(settings)); } catch(e) {} }
function goalPaceSecs() {
  var parts = settings.goalTime.split(':');
  var totalSecs = parseInt(parts[0])*3600 + parseInt(parts[1])*60 + (parseInt(parts[2])||0);
  return Math.round(totalSecs / 26.2);
}
function fmtPace(s) { s=Math.round(s); return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }
var currentTab = 'today';
var deferredInstall = null;
var logCtx = null; // {wi, ri} currently open in sheet

function loadState() {
  try {
    var s = localStorage.getItem('marathon-v2');
    if (s) { var p=JSON.parse(s); state.completed=p.completed||{}; state.expandedWeek=p.expandedWeek!=null?p.expandedWeek:-1; state.logs=p.logs||{}; state.adjusted=p.adjusted||{}; }
  } catch(e) {}
}
function saveState() { try { localStorage.setItem('marathon-v2',JSON.stringify(state)); } catch(e) {} }

function isCompleted(wi,ri) { return !!state.completed[wi+'-'+ri]; }
function toggleRun(wi,ri) {
  var k=wi+'-'+ri;
  if (state.completed[k]) return;
  state.completed[k]=true;
  saveState(); syncRun(wi,ri); renderAll();
}
function weekDone(wi) {
  return wks[wi][4].reduce(function(n,r,ri){ return n+(isCompleted(wi,ri)?1:0); },0);
}

// ── Date helpers ──────────────────────────────────────────────
function now() { return new Date(); }
function diffDays(a,b) { return Math.floor((b-a)/86400000); }
function currentWeekIdx() {
  var d=diffDays(getPlanStart(),now());
  if (d<0) return -1;
  var i=Math.floor(d/7);
  return i>=26?-2:i;
}
function todayRunIdx() { return RUN_DAYS.indexOf(now().getDay()); }

// ── Navigation ────────────────────────────────────────────────
function switchTab(tab) {
  currentTab=tab;
  ['today','plan','stats','strava'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  renderTab(tab);
}

// ── Shared run row ────────────────────────────────────────────
function runRow(wi,ri,showDay,highlight) {
  var run=wks[wi][4][ri];
  var isRace=run[2].startsWith('RACE');
  var done=isCompleted(wi,ri);
  var log=state.logs[wi+'-'+ri];
  var col=PC[wks[wi][2]];
  var dl='';
  var rawDesc=dynDesc(run[2],run[1]);
  var desc=rawDesc.length>58?rawDesc.slice(0,58)+'…':rawDesc;
  var plannedMi=getPlannedMiles(wi,ri);
  var origMi=run[0];
  var mi=isRace?'26.2':plannedMi;
  var adjTag=(!isRace&&plannedMi!==origMi)?'<span style="font-size:10px;color:'+(plannedMi>origMi?'#5DCAA5':'#F0997B')+';margin-left:3px">'+(plannedMi>origMi?'↑':'↓')+Math.abs(plannedMi-origMi)+'</span>':'';
  var checkStyle=done?'style="background:'+col+';border-color:'+col+'"':'';
  var dotSize=highlight?'width:12px;height:12px;':'';
  var logBadge=log?'<div class="log-badge">'
    +(log.miles?log.miles+' mi':'')+(log.miles&&log.pace?' · ':'')+( log.pace?log.pace+'/mi':'')
    +(log.note?' · '+log.note.slice(0,22)+(log.note.length>22?'…':''):'')+'</div>':'';
  return '<div class="run-item'+(highlight?' hi':'')+'"'+(highlight?' style="background:'+PL[wks[wi][2]]+';"':'')+'>'
    +'<div class="run-dot" style="background:'+TC[run[1]]+';'+dotSize+'"></div>'
    +'<div class="run-info"><div class="run-mi">'+mi+' mi'+(adjTag||'')+'</div><div class="run-desc">'+desc+'</div>'+logBadge+'</div>'
    +(done?'<div style="color:#5DCAA5;font-size:18px;flex-shrink:0;">✓</div>':'')
    +'</div>';
}

// ── Goal settings ─────────────────────────────────────────────
function toggleGoalEdit() {
  var el = document.getElementById('goal-edit');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function saveGoalSettings() {
  var t = document.getElementById('edit-goal-time').value.trim();
  var d = document.getElementById('edit-race-date').value;
  if (t) settings.goalTime = t;
  if (d) settings.raceDate = d;
  saveSettings();
  if (sb && currentUser) sb.auth.updateUser({ data: { goalTime: settings.goalTime, raceDate: settings.raceDate } });
  toggleGoalEdit();
  renderAll();
}
function weeksToRace() {
  var diff = diffDays(now(), getRaceDate());
  return Math.max(0, Math.ceil(diff/7));
}

// ── Plan tab ──────────────────────────────────────────────────
function renderPlan() {
  var el=document.getElementById('tab-plan');
  var cwi=currentWeekIdx();
  el.innerHTML=wks.map(function(w,i){
    var done=weekDone(i); var total=w[4].length;
    var pct=total?Math.round(done/total*100):0;
    var exp=state.expandedWeek===i; var isCur=i===cwi;
    var bStyle=isCur?'border-color:'+PC[w[2]]+';':'';
    var miLbl=w[0]===26?'Race!':w[3]+' mi';

    var card='<div class="wk-card'+(exp?' exp':'')+'" style="'+bStyle+'" onclick="toggleWeek('+i+')">'
      +'<div class="wk-head">'
        +'<div><div class="wk-num">WK '+w[0]+(isCur?' · NOW':'')+'</div>'
        +'<div class="wk-row"><span class="wk-date">'+wkDateStr(i)+'</span>'
        +'<span class="phase-chip" style="background:'+PL[w[2]]+';color:'+PC[w[2]]+'">'+PN[w[2]]+'</span></div></div>'
        +'<div class="wk-right"><div class="wk-mi" style="color:'+PC[w[2]]+'">'+miLbl+'</div>'
        +'<div class="wk-runs">'+done+'/'+total+' done</div></div>'
      +'</div>'
      +'<div class="wk-pbar"><div class="wk-pfill" style="width:'+pct+'%;background:'+PC[w[2]]+'"></div></div>'
      +'</div>';

    var detail='';
    if (exp) {
      detail='<div class="wk-detail open" id="wd-'+i+'"><div class="wk-tip">'+PT[w[2]]+'</div>';
      w[4].forEach(function(_,ri){ detail+=runRow(i,ri,true,false); });
      detail+='</div>';
    }
    return card+detail;
  }).join('');

  if (cwi>=0) setTimeout(function(){
    var cards=el.querySelectorAll('.wk-card');
    if (cards[cwi]) cards[cwi].scrollIntoView({block:'center',behavior:'smooth'});
  },50);
}

function toggleWeek(i) {
  state.expandedWeek=state.expandedWeek===i?-1:i;
  saveState(); renderPlan();
  setTimeout(function(){
    var p=document.getElementById('wd-'+i);
    if(p) p.scrollIntoView({block:'nearest',behavior:'smooth'});
  },60);
}

// ── Stats tab ─────────────────────────────────────────────────
function renderStats() {
  var el=document.getElementById('tab-stats');
  var tRuns=0,dRuns=0,tMi=0,dMi=0;
  wks.forEach(function(w,wi){ w[4].forEach(function(r,ri){
    if(r[2].startsWith('RACE')) return;
    tRuns++; tMi+=r[0];
    if(isCompleted(wi,ri)){ dRuns++; dMi+=r[0]; }
  }); });
  var pct=tRuns?Math.round(dRuns/tRuns*100):0;
  var cwi=currentWeekIdx();
  var weeksIn=cwi>=0?cwi:cwi===-2?26:0;

  var R=54,C=(2*Math.PI*R),off=(C*(1-pct/100)).toFixed(1);
  var ring='<svg width="140" height="140" viewBox="0 0 140 140">'
    +'<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="#e0e0da" stroke-width="10"/>'
    +'<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="#5DCAA5" stroke-width="10"'
    +' stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off+'"'
    +' stroke-linecap="round" transform="rotate(-90 70 70)"/>'
    +'<text x="70" y="65" text-anchor="middle" font-size="30" font-weight="700" fill="#1a1a18" font-family="-apple-system,sans-serif">'+pct+'%</text>'
    +'<text x="70" y="84" text-anchor="middle" font-size="12" fill="#888" font-family="-apple-system,sans-serif">complete</text>'
    +'</svg>';

  // Actual logged miles
  var actMi=0, actRuns=0;
  wks.forEach(function(w,wi){ w[4].forEach(function(r,ri){
    var log=state.logs[wi+'-'+ri];
    if (log&&log.miles) { actMi+=parseFloat(log.miles)||0; actRuns++; }
  }); });
  actMi=Math.round(actMi*10)/10;

  var html='<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-label">Runs done</div><div class="stat-val">'+dRuns+'</div><div class="stat-sub">of '+tRuns+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Miles planned</div><div class="stat-val">'+dMi+'</div><div class="stat-sub">'+(actRuns>0?'actual: '+actMi+' mi':'of '+tMi+' total')+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Weeks in</div><div class="stat-val">'+weeksIn+'</div><div class="stat-sub">of 26 weeks</div></div>'
    +'<div class="stat-card"><div class="stat-label">Avg mi/week</div><div class="stat-val">'+(weeksIn>0?Math.round((actRuns>0?actMi:dMi)/weeksIn):0)+'</div><div class="stat-sub">'+(actRuns>0?'actual':'planned')+'</div></div>'
    +'</div>'
    +'<div class="card ring-wrap">'+ring+'</div>';

  html+='<div class="card"><div class="section-label">Phase breakdown</div>';
  [[0,'Base'],[1,'Build'],[2,'Peak'],[3,'Taper']].forEach(function(p){
    var pr=0,pd=0;
    wks.forEach(function(w,wi){ if(w[2]===p[0]) w[4].forEach(function(r,ri){
      if(!r[2].startsWith('RACE')){ pr++; if(isCompleted(wi,ri)) pd++; }
    }); });
    var pp=pr?Math.round(pd/pr*100):0;
    html+='<div class="pb-row"><div class="pb-name">'+p[1]+'</div>'
      +'<div class="pb-track"><div class="pb-fill" style="width:'+pp+'%;background:'+PC[p[0]]+'"></div></div>'
      +'<div class="pb-ct">'+pd+'/'+pr+'</div></div>';
  });
  html+='</div>';

  var gp=goalPaceSecs();
  html+='<div class="card"><div class="section-label">Pace guide</div>'
    +'<div class="pace-row"><div class="pdot" style="background:#9FE1CB"></div><div>Easy / long run<br><span style="color:var(--muted);font-size:12px">'+fmtPace(gp+75)+'–'+fmtPace(gp+105)+' /mi</span></div></div>'
    +'<div class="pace-row"><div class="pdot" style="background:#85B7EB"></div><div>Tempo<br><span style="color:var(--muted);font-size:12px">'+fmtPace(gp-30)+'–'+fmtPace(gp-15)+' /mi</span></div></div>'
    +'<div class="pace-row"><div class="pdot" style="background:#F0997B"></div><div>Marathon pace<br><span style="color:var(--muted);font-size:12px">'+fmtPace(gp-4)+'–'+fmtPace(gp+2)+' /mi</span></div></div>'
    +'</div>';

  if (stravaConnected()) {
    var athlete = (stravaToken()||{}).athlete;

// ── Mile redistribution ───────────────────────────────────────
function getPlannedMiles(wi,ri) {
  return state.adjusted[wi+'-'+ri]!=null ? state.adjusted[wi+'-'+ri] : wks[wi][4][ri][0];
}
function recalcAdjustments(wi) {
  var w=wks[wi];
  // Clear existing adjustments for this week
  w[4].forEach(function(_,ri){ delete state.adjusted[wi+'-'+ri]; });
  // Total delta across all logged runs (rounded to nearest mile each)
  var totalDelta=0;
  w[4].forEach(function(run,ri){
    var log=state.logs[wi+'-'+ri];
    if (!log||log.miles==null) return;
    totalDelta+=Math.round(parseFloat(log.miles)-run[0]);
  });
  if (totalDelta===0) return;
  // Pool: uncompleted, unlogged easy runs
  var pool=[];
  w[4].forEach(function(run,ri){
    if (run[1]===0&&!isCompleted(wi,ri)&&!state.logs[wi+'-'+ri]&&!run[2].startsWith('RACE')) pool.push(ri);
  });
  if (!pool.length) return;
  // Spread -totalDelta 1 mile at a time, cycling through pool
  var sign=totalDelta>0?-1:1;
  var remaining=Math.abs(totalDelta);
  var adj={};
  pool.forEach(function(ri){ adj[ri]=0; });
  while (remaining>0) {
    var progress=false;
    for (var j=0;j<pool.length&&remaining>0;j++) {
      var ri=pool[j];
      var cur=w[4][ri][0]+(adj[ri]||0);
      if (sign===-1&&cur<=1) continue; // never go below 1 mi
      adj[ri]=(adj[ri]||0)+sign;
      remaining--;
      progress=true;
    }
    if (!progress) break;
  }
  pool.forEach(function(ri){ if (adj[ri]!==0) state.adjusted[wi+'-'+ri]=w[4][ri][0]+adj[ri]; });
}

// ── Pace analysis ─────────────────────────────────────────────
function parsePaceSecs(str) {
  var m=(str||'').trim().match(/^(\d+):(\d{2})$/);
  return m?parseInt(m[1])*60+parseInt(m[2]):0;
}
function secsToPace(s) {
  s=Math.round(s); var m=Math.floor(s/60),sec=s%60;
  return m+':'+(sec<10?'0':'')+sec;
}
function getPaceSuggestions() {
  var TEMPO_MID=8*60+2, MP_MID=8*60+22; // midpoints of plan ranges
  var tSecs=[],mpSecs=[];
  wks.forEach(function(w,wi){ w[4].forEach(function(run,ri){
    var log=state.logs[wi+'-'+ri];
    if (!log||!log.pace) return;
    var s=parsePaceSecs(log.pace); if (!s) return;
    if (run[1]===1) tSecs.push(s);
    if (run[1]===2) mpSecs.push(s);
  }); });
  var res=null;
  if (tSecs.length>=2) {
    var avg=Math.round(tSecs.reduce(function(a,b){return a+b;},0)/tSecs.length);
    if (Math.abs(avg-TEMPO_MID)>10) {
      res=res||{};
      res.tempo={ avg:secsToPace(avg), range:secsToPace(avg-8)+'–'+secsToPace(avg+8)+'/mi' };
    }
  }
  if (mpSecs.length>=2) {
    var avg2=Math.round(mpSecs.reduce(function(a,b){return a+b;},0)/mpSecs.length);
    if (Math.abs(avg2-MP_MID)>10) {
      res=res||{};
      res.mp={ avg:secsToPace(avg2), range:secsToPace(avg2-4)+'–'+secsToPace(avg2+6)+'/mi' };
    }
  }
  return res;
}

// ── Supabase data sync ────────────────────────────────────────
async function loadFromSupabase() {
  if (!currentUser || !sb) return;
  var res = await sb.from('run_logs').select('*').eq('user_id', currentUser.id);
  if (!res.data || !res.data.length) {
    // No cloud data — push existing local state up to Supabase
    var keys = Object.keys(state.completed);
    for (var i=0; i<keys.length; i++) {
      var parts = keys[i].split('-');
      await syncRun(parseInt(parts[0]), parseInt(parts[1]));
    }
    return;
  }
  // Merge cloud into local — never wipe local-only data
  res.data.forEach(function(row) {
    var key = row.week_idx+'-'+row.run_idx;
    if (row.completed) state.completed[key] = true;
    if (row.actual_miles || row.actual_pace || row.note) {
      state.logs[key] = { miles: row.actual_miles, pace: row.actual_pace, note: row.note };
    }
  });
  for (var i=0;i<26;i++) recalcAdjustments(i);
  saveState();
}

async function syncRun(wi, ri) {
  if (!currentUser || !sb) return;
  var key = wi+'-'+ri;
  var log = state.logs[key] || {};
  await sb.from('run_logs').upsert({
    user_id: currentUser.id, week_idx: wi, run_idx: ri,
    actual_miles: log.miles||null, actual_pace: log.pace||null,
    note: log.note||null, completed: !!state.completed[key]
  }, { onConflict: 'user_id,week_idx,run_idx' });
}

async function refreshStravaIfNeeded() {
  var t=stravaToken(); if (!t) return null;

  var res=await fetch('https://www.strava.com/oauth/token',{

  });
  var d=await res.json();
  if (d.access_token) { localStorage.setItem('strava_token',JSON.stringify(Object.assign({},t,d))); return d.access_token; }

  }
}

async function stravaImport() {
  if (!logCtx) return;
  var wi=logCtx.wi, ri=logCtx.ri;
  if (!stravaConnected()) { connectStrava(); return; }
  var token=await refreshStravaIfNeeded(); if (!token) { connectStrava(); return; }

  var btn=document.getElementById('strava-import-btn');
  btn.textContent='Fetching…'; btn.disabled=true;

  // Fetch 20 most recent activities — find closest run by distance
  var res=await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=20',
    {headers:{'Authorization':'Bearer '+token}});
  var acts=await res.json();
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg> Import from Strava';
  btn.disabled=false;

  if (!Array.isArray(acts)) {
    localStorage.removeItem('strava_token');
    alert('Strava auth error: '+(acts.message||JSON.stringify(acts))+'\n\nPlease reconnect Strava in the Stats tab.');
    return;
  }
  if (!acts.length) { alert('No Strava activities found. Make sure you have runs synced to Strava.'); return; }
  var runs=acts.filter(function(a){return a.type==='Run'||a.sport_type==='Run';});
  if (!runs.length) { alert('No running activities found in your recent Strava history.'); return; }
  var plannedMeters=wks[wi][4][ri][0]*1609.34;
  var act=runs.reduce(function(best,a){
    return Math.abs(a.distance-plannedMeters)<Math.abs(best.distance-plannedMeters)?a:best;
  },runs[0]);
  var miles=Math.round((act.distance/1609.34)*100)/100;
  var secPerMile=act.moving_time/(act.distance/1609.34);
  var pm=Math.floor(secPerMile/60), ps=Math.round(secPerMile%60);
  document.getElementById('log-miles').value=miles;
  document.getElementById('log-pace').value=pm+':'+(ps<10?'0':'')+ps;
  if (!document.getElementById('log-note').value) document.getElementById('log-note').value=act.name||'';
}

// ── Strava tab ────────────────────────────────────────────────
var stravaActs = [];
var pendingStravaAct = null;

async function renderStrava() {
  var el = document.getElementById('tab-strava');
  if (!stravaConnected()) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:36px 20px;">'
      +'<div style="font-size:48px;margin-bottom:12px">🏅</div>'
      +'<div style="font-size:17px;font-weight:600;margin-bottom:6px;">Connect Strava</div>'
      +'<div style="font-size:13px;color:var(--muted);margin-bottom:20px;">Import your runs automatically</div>'
      +'<button class="btn-strava" onclick="connectStrava()" style="margin:0 auto;max-width:240px">'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>'
      +'Connect Strava</button></div>';
    return;
  }

  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">Loading runs…</div>';

  var token = await refreshStravaIfNeeded();
  if (!token) {
    el.innerHTML = '<div class="card center-card"><div style="font-size:13px;color:var(--muted)">Session expired.</div>'
      +'<button class="btn-strava" onclick="connectStrava()" style="margin-top:16px">'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>'
      +'Reconnect Strava</button></div>';
    return;
  }

  // First test if token works at all
  var athleteRes = await fetch('https://www.strava.com/api/v3/athlete', {headers:{'Authorization':'Bearer '+token}});
  var athlete = await athleteRes.json();
  if (!athlete.id) {
    el.innerHTML = '<div class="card"><div style="font-size:13px;color:#F0997B;">Auth test failed: '+JSON.stringify(athlete)+'</div><button class="btn-strava" onclick="disconnectStrava();switchTab(\'strava\')" style="margin-top:12px">Reconnect Strava</button></div>';
    return;
  }

  var res = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=30&_='+Date.now(), {headers:{'Authorization':'Bearer '+token, 'Cache-Control':'no-cache'}});
  var rawText = await res.text();
  var acts;
  try { acts = JSON.parse(rawText); } catch(e) { acts = []; }

  // Debug: show raw info if empty
  if (!Array.isArray(acts) || !acts.length) {
    el.innerHTML = '<div class="card"><div class="section-label">Debug info</div>'
      +'<div style="font-size:12px;color:var(--muted);line-height:1.7">'
      +'Athlete: '+athlete.firstname+' '+athlete.lastname+'<br>'
      +'HTTP status: '+res.status+'<br>'
      +'Response: '+rawText.slice(0,300)
      +'</div><button onclick="renderStrava()" style="margin-top:12px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-family:inherit;">Retry</button></div>';
    return;
  }

  if (!Array.isArray(acts)) {
    localStorage.removeItem('strava_token');
    el.innerHTML = '<div class="card center-card"><div style="font-size:13px;color:#F0997B;margin-bottom:16px;">Strava error: '+(acts.message||'auth failed')+'. Please reconnect.</div>'
      +'<button class="btn-strava" onclick="connectStrava()">'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>'
      +'Reconnect Strava</button></div>';
    return;
  }

  stravaActs = acts.filter(function(a){
    var t=(a.sport_type||a.type||'').toLowerCase();
    return t.indexOf('run')!==-1;
  });

  if (!stravaActs.length) {
    // Show all activity types for debugging
    var types = acts.map(function(a){return (a.sport_type||a.type);}).join(', ');
    el.innerHTML = '<div class="card center-card"><div style="font-size:13px;color:var(--muted);">No running activities found.<br><br>'
      +(acts.length?'Found '+acts.length+' activities of type: '+types:'No activities at all — make sure your run has synced to Strava.')
      +'</div></div>';
    return;
  }

  var html = '<div class="card"><div class="section-label">Recent runs</div>';
  stravaActs.forEach(function(a, idx) {
    var miles = Math.round((a.distance/1609.34)*100)/100;
    var spm = a.moving_time/(a.distance/1609.34);
    var pm = Math.floor(spm/60), ps = Math.round(spm%60);
    var pace = pm+':'+(ps<10?'0':'')+ps;
    var d = new Date(a.start_date_local);
    var dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});
    html += '<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);">'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-size:13px;font-weight:600;">'+miles+' mi · '+pace+'/mi</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-top:2px;">'+dateStr+' · '+a.name+'</div>'
      +'</div>'
      +'<button onclick="openRunPicker('+idx+')" style="flex-shrink:0;padding:7px 13px;background:#FC4C02;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Log →</button>'
      +'</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

var pickerOverlay = null;
function openRunPicker(actIdx) {
  pendingStravaAct = stravaActs[actIdx];
  var wi = currentWeekIdx(); if (wi < 0) wi = 0;

  var html = '<div id="picker-overlay" onclick="closeRunPicker()" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:150;backdrop-filter:blur(2px);"></div>'
    +'<div id="picker-sheet" style="position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));z-index:151;max-width:520px;margin:0 auto;">'
    +'<div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>'
    +'<div style="font-size:15px;font-weight:600;margin-bottom:4px;">Which training run is this?</div>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:16px;">'
    +Math.round((pendingStravaAct.distance/1609.34)*10)/10+' mi · '+new Date(pendingStravaAct.start_date_local).toLocaleDateString('en-US',{month:'short',day:'numeric'})
    +'</div>';

  // Show surrounding weeks
  for (var w = Math.max(0,wi-1); w <= Math.min(25,wi+1); w++) {
    var wk = wks[w];
    html += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin:10px 0 6px;">Week '+wk[0]+' · '+wk[1]+'</div>';
    wk[4].forEach(function(run, ri) {
      var done = isCompleted(w, ri);
      html += '<div onclick="assignStravaToRun('+w+','+ri+')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:'+(done?'#f5f5f3':'var(--bg)')+';margin-bottom:6px;cursor:pointer;border:1px solid var(--border);">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:'+TC[run[1]]+';flex-shrink:0;"></div>'
        +'<div style="flex:1;font-size:13px;">'+run[0]+' mi · '+run[2].slice(0,40)+'</div>'
        +(done?'<div style="font-size:11px;color:var(--muted);">✓ done</div>':'')
        +'</div>';
    });
  }
  html += '</div>';

  var wrap = document.createElement('div');
  wrap.id = 'picker-wrap';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  pickerOverlay = wrap;
}

function closeRunPicker() {
  var w = document.getElementById('picker-wrap');
  if (w) w.remove();
  pickerOverlay = null;
}

function assignStravaToRun(wi, ri) {
  closeRunPicker();
  var a = pendingStravaAct;
  var miles = Math.round((a.distance/1609.34)*100)/100;
  var spm = a.moving_time/(a.distance/1609.34);
  var pm = Math.floor(spm/60), ps = Math.round(spm%60);
  var pace = pm+':'+(ps<10?'0':'')+ps;
  var key = wi+'-'+ri;
  state.logs[key] = { miles: miles, pace: pace, note: a.name||'' };
  state.completed[key] = true; // permanent - can't be unchecked
  recalcAdjustments(wi);
  saveState();
  syncRun(wi, ri);
  renderAll();
  switchTab('today');
}

// ── Boot ──────────────────────────────────────────────────────
loadSettings();
loadState();
initSupabase();
checkAuth();
handleStravaCallback();
</script>
